# Test Profile Configuration
spring.application.name=pos-api-test

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Cloudinary (will be mocked)
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
cloudinary.folder=test

# Disable Stripe (will be mocked)
stripe.sr-key=test
stripe.publishable-key=test
stripe.webhook-secret=test

# JWT
jwt.signerKey=fd0874c323c8f2fb6c59e865fb22ad5f70f43604ddecc1fb7ca2e2489d5d97c0
jwt.valid-duration=3600
jwt.refreshable-duration=36000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.personal.store_api=INFO

# Disable DevTools
spring.devtools.restart.enabled=false
